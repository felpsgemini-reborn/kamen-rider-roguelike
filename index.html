<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamen Rider: Chronicles Roguelike</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Desativar seleção de texto para parecer um aplicativo nativo */
        *, *::before, *::after {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            overflow: hidden;
            background-color: #0f172a;
        }
    </style>
</head>
<body class="text-slate-100 font-sans h-screen w-screen flex flex-col justify-center items-center p-4">

    <div id="gameContainer" class="w-full max-w-5xl h-full max-h-[640px] bg-slate-800 border border-slate-700 rounded-xl shadow-2xl flex flex-col overflow-hidden relative">
        
        <div id="telaBoot" class="flex-1 flex flex-col items-center justify-center p-6 text-center">
            <h1 class="text-4xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-500 uppercase mb-2">
                Kamen Rider
            </h1>
            <h2 class="text-xs font-mono tracking-[0.3em] text-slate-400 uppercase mb-8">
                Chronicles Roguelike // v0.1
            </h2>
            
            <div class="space-y-3 w-full max-w-xs">
                <button onclick="iniciarNovoJogo()" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white font-bold py-3 px-6 rounded-lg shadow-lg active:scale-95 transition-all uppercase text-sm tracking-wider">
                    Iniciar Transmissão
                </button>
                <div class="text-[10px] font-mono text-slate-500">
                    Sistema PWA Pronto para Instalação
                </div>
            </div>
        </div>

        <div id="telaPainel" class="hidden flex-1 flex flex-col p-6">
            <header class="flex justify-between items-center border-b border-slate-700 pb-4 mb-4">
                <div>
                    <h3 class="text-lg font-bold text-emerald-400">Rider_System_Active</h3>
                    <p class="text-xs font-mono text-slate-400" id="saveStatus">Aguardando registro...</p>
                </div>
                <button onclick="resetarProgresso()" class="bg-slate-700 hover:bg-red-600 px-3 py-1.5 rounded font-mono text-xs transition-colors">
                    Reset_Data
                </button>
            </header>
            
            <div class="flex-1 flex items-center justify-center border-2 border-dashed border-slate-700 rounded-lg bg-slate-900/50">
                <p class="text-slate-500 font-mono text-sm">Fase 2: Estrutura do Menu estilo Final Fantasy será renderizada aqui.</p>
            </div>
        </div>

    </div>

    <script>
        // Configurações futuras do Supabase (Mantenha as variáveis prontas)
        const supabaseUrl = 'https://SEU_PROJETO.supabase.co';
        const supabaseKey = 'SUA_CHAVE_ANON_PREENCHIDA_DEPOIS';
        let supabaseClient = null;

        // Estado Global da Run (Instancia inicial mínima para persistência de dados)
        let gameState = {
            runAtiva: false,
            timestamp: null,
            mundoAtual: 1,
            caminhoPasso: 0
        };

        // Gerenciamento de Telas do DOM
        const telaBoot = document.getElementById('telaBoot');
        const telaPainel = document.getElementById('telaPainel');
        const saveStatus = document.getElementById('saveStatus');

        function verificarSaveLocal() {
            const save = localStorage.getItem('kr_roguelike_save');
            if (save) {
                gameState = JSON.parse(save);
                if (gameState.runAtiva) {
                    mostrarPainel();
                    saveStatus.innerText = `Progresso carregado localmente: Mundo ${gameState.mundoAtual}`;
                }
            }
        }

        function salvarProgresso() {
            gameState.timestamp = Date.now();
            localStorage.setItem('kr_roguelike_save', JSON.stringify(gameState));
        }

        function iniciarNovoJogo() {
            gameState.runAtiva = true;
            gameState.mundoAtual = 1;
            gameState.caminhoPasso = 1;
            salvarProgresso();
            mostrarPainel();
            saveStatus.innerText = "Nova run sincronizada no armazenamento local.";
        }

        function resetarProgresso() {
            if (confirm("Deseja apagar os dados da run atual?")) {
                localStorage.removeItem('kr_roguelike_save');
                gameState = { runAtiva: false, timestamp: null, mundoAtual: 1, caminhoPasso: 0 };
                telaPainel.classList.add('hidden');
                telaBoot.classList.remove('hidden');
            }
        }

        function mostrarPainel() {
            telaBoot.classList.add('hidden');
            telaPainel.classList.remove('hidden');
        }

        // Inicialização automática
        window.addEventListener('DOMContentLoaded', () => {
            verificarSaveLocal();
        });
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .catch(err => console.log('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
